<tr id="user-{{ u.id }}">
  <td><strong>{{ u.nickname }}</strong></td>
  <td>{{ u.created_at.strftime('%Y-%m-%d %H:%M') }} UTC</td>
  <td>
    {% if u.last_workflow_id %}
      <a class="temporal-link" href="{{ temporal_ui_url }}/namespaces/default/workflows/{{ u.last_workflow_id }}" target="_blank">{{ u.last_workflow_id }}</a>
    {% else %}
      <span style="color:#aaa;">—</span>
    {% endif %}
  </td>
  <td>
    <button
      class="btn-delete"
      hx-delete="/api/users/{{ u.id }}"
      hx-target="#flash"
      hx-swap="innerHTML"
      hx-confirm="Delete {{ u.nickname }}?"
      hx-on::before-request="this.textContent='Deleting…'; this.disabled=true;"
    >Delete</button>
  </td>
</tr>
